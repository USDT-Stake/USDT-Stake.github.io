<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>USDT Stake - Decentralized DeFi Portal</title>
  <meta name="description" content="Secure, non-custodial portal for USDT Stake DeFi operations directly from your own wallet.">
  <link rel="canonical" href="https://usdt-stake.github.io/">
  <meta name="robots" content="index,follow">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="prefetch" href="dashboard/">
  <link rel="prerender" href="dashboard/">
  <style>


:root {
  --bg: #f7f4ef;
  --surface: #fffdfa;
  --panel: #ffffff;
  --ink: #151515;
  --muted: #696764;
  --soft: #908d88;
  --line: rgba(21, 21, 21, 0.1);
  --line-strong: rgba(21, 21, 21, 0.16);
  --accent: #26A17B;
  --accent-soft: rgba(38, 161, 123, 0.12);
  --shadow: 0 28px 70px -42px rgba(21, 21, 21, 0.5);
  --max: 1120px;
}

* {
  box-sizing: border-box;
}

html,
body {
  min-height: 100%;
}

body {
  min-height: 100dvh;
  margin: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  color: var(--ink);
  background:
    radial-gradient(circle at 50% -16%, rgba(38, 161, 123, 0.13), transparent 34%),
    linear-gradient(180deg, var(--surface) 0%, var(--bg) 64%, #f3f0eb 100%);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

a {
  color: inherit;
  text-decoration: none;
}

img {
  display: block;
  max-width: 100%;
}

h1,
p {
  margin: 0;
}

.topbar {
  width: min(var(--max), calc(100% - 32px));
  margin: 0 auto;
  min-height: 72px;
  display: flex;
  align-items: center;
  gap: 18px;
  flex: 0 0 auto;
}

.brand {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
  color: var(--ink);
  font-size: 1.02rem;
  font-weight: 760;
  line-height: 1;
  white-space: nowrap;
}

.brand img {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  box-shadow: 0 0 0 1px var(--line);
}

.nav {
  display: flex;
  align-items: center;
  gap: clamp(18px, 2.4vw, 30px);
  margin-left: clamp(4px, 1.8vw, 18px);
}

.nav a {
  color: var(--muted);
  font-size: 0.93rem;
  font-weight: 560;
  line-height: 1;
  transition: color 160ms ease;
}

.nav a:hover {
  color: var(--ink);
}

.spacer {
  flex: 1;
}

.ghost,
.enter {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  white-space: nowrap;
}

.ghost {
  min-height: 40px;
  padding: 0 17px;
  border: 1px solid var(--line-strong);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.58);
  color: var(--ink);
  font-size: 0.91rem;
  font-weight: 680;
  box-shadow: 0 12px 28px -24px rgba(21, 21, 21, 0.7);
  transition: border-color 160ms ease, transform 160ms ease, background 160ms ease;
}

.ghost:hover {
  transform: translateY(-1px);
  border-color: rgba(38, 161, 123, 0.5);
  background: #ffffff;
}

.stage {
  width: min(var(--max), calc(100% - 32px));
  margin: 0 auto;
  flex: 1 1 auto;
  min-height: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: clamp(24px, 4vh, 34px);
  padding: 8px 0 12px;
  text-align: center;
}

.hero {
  display: grid;
  justify-items: center;
  gap: 15px;
}

h1 {
  max-width: 10ch;
  font-size: clamp(3.05rem, 7vw, 5.15rem);
  font-weight: 820;
  letter-spacing: 0;
  line-height: 0.96;
}

.sub {
  max-width: 57ch;
  color: var(--muted);
  font-size: clamp(1rem, 1.55vw, 1.18rem);
  font-weight: 470;
  line-height: 1.55;
}

.sub strong {
  color: var(--ink);
  font-weight: 760;
  box-shadow: inset 0 -0.46em 0 var(--accent-soft);
}

.app-card {
  --mx: 50%;
  --my: 18%;
  position: relative;
  width: min(430px, 100%);
  padding: 22px;
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: 22px;
  background:
    radial-gradient(circle at var(--mx) var(--my), rgba(38, 161, 123, 0.12), transparent 34%),
    linear-gradient(180deg, #ffffff 0%, #fffefa 100%);
  box-shadow: var(--shadow);
}

.app-card::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.84);
}

.token-row {
  position: relative;
  display: flex;
  align-items: center;
  gap: 15px;
  min-height: 82px;
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 16px;
  background: rgba(247, 244, 239, 0.58);
  text-align: left;
}

.token-icon {
  display: grid;
  place-items: center;
  flex: 0 0 auto;
  width: 58px;
  height: 58px;
  border-radius: 50%;
  background: #ffffff;
  box-shadow: 0 0 0 1px var(--line), 0 16px 34px -26px rgba(21, 21, 21, 0.7);
}

.token-icon img {
  width: 52px;
  height: 52px;
  border-radius: 50%;
}

.token-copy {
  min-width: 0;
  display: grid;
  gap: 5px;
}

.token-label {
  color: var(--ink);
  font-size: 1.08rem;
  font-weight: 780;
  line-height: 1.16;
}

.token-note {
  color: var(--soft);
  font-size: 0.88rem;
  font-weight: 560;
  line-height: 1.25;
}

.card-line {
  width: 1px;
  height: 24px;
  margin: 0 auto;
  background: linear-gradient(180deg, var(--line-strong), rgba(21, 21, 21, 0));
}

.enter {
  position: relative;
  width: 100%;
  min-height: 56px;
  gap: 8px;
  border-radius: 15px;
  background: var(--accent);
  color: #ffffff;
  font-size: 1.05rem;
  font-weight: 820;
  line-height: 1;
  box-shadow: 0 18px 34px -24px rgba(21, 21, 21, 0.85);
  transition: filter 160ms ease, transform 160ms ease, box-shadow 160ms ease;
}

.enter:hover {
  filter: brightness(0.96);
  transform: translateY(-1px);
  box-shadow: 0 22px 38px -24px rgba(21, 21, 21, 0.9);
}

.enter span {
  font-size: 1.35em;
  line-height: 0;
  transform: translateY(-1px);
}

.foot {
  flex: 0 0 auto;
  padding: 0 16px 24px;
  color: var(--soft);
  font-size: 0.86rem;
  font-weight: 560;
  text-align: center;
}

@media (max-width: 680px) {
  body {
    background:
      radial-gradient(circle at 50% -8%, rgba(38, 161, 123, 0.16), transparent 38%),
      linear-gradient(180deg, var(--surface) 0%, var(--bg) 66%, #f3f0eb 100%);
  }

  .topbar {
    width: min(100% - 24px, var(--max));
    min-height: 64px;
    gap: 10px;
  }

  .brand {
    font-size: 0.98rem;
  }

  .brand img {
    width: 28px;
    height: 28px;
  }

  .nav {
    display: none;
  }

  .ghost {
    min-height: 38px;
    padding: 0 14px;
    font-size: 0.87rem;
  }

  .stage {
    width: min(100% - 24px, var(--max));
    gap: 22px;
    padding: 4px 0 10px;
  }

  .hero {
    gap: 13px;
  }

  h1 {
    font-size: clamp(2.55rem, 15vw, 3.55rem);
    line-height: 0.98;
  }

  .sub {
    max-width: 32ch;
    font-size: 0.98rem;
    line-height: 1.48;
  }

  .app-card {
    width: min(100%, 390px);
    padding: 18px;
    border-radius: 20px;
  }

  .token-row {
    min-height: 78px;
    padding: 13px;
    gap: 13px;
  }

  .token-icon {
    width: 54px;
    height: 54px;
  }

  .token-icon img {
    width: 48px;
    height: 48px;
  }

  .token-label {
    font-size: 1rem;
  }

  .enter {
    min-height: 54px;
  }

  .foot {
    padding-bottom: 16px;
    font-size: 0.82rem;
  }
}

@media (max-width: 360px), (max-height: 700px) {
  .topbar {
    min-height: 58px;
  }

  .stage {
    gap: 16px;
  }

  h1 {
    font-size: clamp(2.25rem, 13vw, 3rem);
  }

  .sub {
    font-size: 0.92rem;
  }

  .app-card {
    padding: 15px;
  }

  .foot {
    padding-bottom: 12px;
  }
}


  
.footer {
  text-align: center !important;
}
  </style>
</head>

  <header class="topbar">
    <div class="brand">
      <img src="favicon.png" width="30" height="30" alt="">
      <span>USDT Stake</span>
    </div>
    <span class="spacer"></span>
    <nav class="nav" aria-label="Main Navigation">
      <a href="how-it-works/">How it works</a>

      <a href="about/">About</a>
      <a href="security/">Security</a>

  </header>
  <main class="stage" style="padding: 100px 24px; text-align: center; max-width: 800px; margin: 0 auto;">

    <p class="value" style="font-size: 1.25rem; opacity: 0.8; margin-bottom: 40px; line-height: 1.6;">Secure, non-custodial gateway for decentralized operations. Connect your Web3 wallet to enter the portal.</p>
    <a class="open-app" href="dashboard/" style="display: inline-flex; justify-content: center; align-items: center; min-height: 52px; padding: 0 32px; border-radius: 9999px; background: var(--accent, #625bf3); color: #fff; font-weight: 700; text-decoration: none; font-size: 1.1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.15); transition: transform 0.2s ease;">Open App Dashboard</a>
  </main>
  <footer class="footer">USDT Stake &mdash; 2026</footer>
</body>
</html>
